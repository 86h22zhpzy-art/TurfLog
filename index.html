<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Turf Log">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1C2333">
<title>Turf Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1C2333;
    --ink-soft: #2B3350;
    --paper: #EDE9DF;
    --paper-dim: #E2DDCF;
    --amber: #D69A2D;
    --amber-bright: #F0B03F;
    --slate: #6B7280;
    --green: #4A7C59;
    --red: #B0503F;
    --line: rgba(28,35,51,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--ink);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(214,154,45,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(214,154,45,0.05), transparent 40%);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: max(24px, env(safe-area-inset-top)) 16px 60px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }

  .masthead { text-align: center; margin-bottom: 28px; }
  .masthead .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--amber);
    text-transform: uppercase;
  }
  .masthead h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 34px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-top: 4px;
    color: var(--paper);
  }
  .masthead .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--slate);
    margin-top: 6px;
  }

  .odometer-card {
    background: var(--paper);
    color: var(--ink);
    border-radius: 4px;
    padding: 22px 20px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    position: relative;
    overflow: hidden;
  }
  .odometer-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--amber), var(--amber-bright), var(--amber));
  }
  .odo-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 10px;
  }
  .odo-display {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
    background: var(--ink);
    border-radius: 3px;
    padding: 18px 8px;
  }
  .odo-digit {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 44px;
    color: var(--amber-bright);
    background: var(--ink-soft);
    border-radius: 3px;
    padding: 2px 4px;
    min-width: 34px;
    text-align: center;
  }
  .odo-unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--slate);
    margin-left: 6px;
  }
  .floor-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--slate);
  }
  .floor-status {
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 3px;
  }
  .floor-status.met { background: rgba(74,124,89,0.15); color: var(--green); }
  .floor-status.under { background: rgba(176,80,63,0.15); color: var(--red); }

  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .btn {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    border: none;
    border-radius: 3px;
    padding: 12px 0;
    cursor: pointer;
    transition: transform 0.08s ease, opacity 0.15s ease;
  }
  .btn:active { transform: scale(0.96); }
  .btn-add { background: var(--amber); color: var(--ink); }
  .btn-reset { background: transparent; color: var(--slate); border: 1px solid var(--line); flex: 0 0 auto; padding: 12px 14px; }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--slate);
  }
  .settings-row input {
    width: 54px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink);
    background: var(--paper-dim);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 4px 6px;
    text-align: center;
  }

  .week-card {
    background: var(--ink-soft);
    border: 1px solid rgba(214,154,45,0.15);
    border-radius: 4px;
    padding: 18px 16px;
    margin-bottom: 16px;
  }
  .week-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
  }
  .week-strip { display: flex; justify-content: space-between; gap: 6px; }
  .day-cell {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    border-radius: 3px;
    background: rgba(255,255,255,0.03);
  }
  .day-cell .d { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--slate); }
  .day-cell .mark { font-size: 16px; margin-top: 4px; }
  .day-cell.met { background: rgba(74,124,89,0.18); }
  .day-cell.under { background: rgba(176,80,63,0.14); }
  .day-cell.today { outline: 1px solid var(--amber); }

  .streak-line {
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--paper);
  }
  .streak-line b { color: var(--amber-bright); }

  .why-card {
    background: var(--paper);
    color: var(--ink);
    border-radius: 4px;
    padding: 18px 18px 16px;
    transform: rotate(-0.4deg);
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    position: relative;
    margin-bottom: 16px;
  }
  .why-card::before {
    content: '';
    position: absolute;
    top: -8px; left: 50%;
    transform: translateX(-50%) rotate(3deg);
    width: 34px; height: 14px;
    background: rgba(214,154,45,0.55);
    border-radius: 2px;
  }
  .why-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 8px;
  }
  .why-text {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    line-height: 1.5;
    text-align: left;
    width: 100%;
    background: transparent;
    border: none;
    resize: vertical;
    color: var(--ink);
    min-height: 220px;
  }
  .why-text:focus { outline: none; }
  .why-save {
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--slate);
  }

  .footer-note {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--slate);
    margin-top: 22px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="eyebrow">Daily Floor Tracker</div>
    <h1>Turf Log</h1>
    <div class="date" id="todayDate">—</div>
  </div>

  <div class="odometer-card">
    <div class="odo-label">Hours logged today</div>
    <div class="odo-display" id="odoDisplay"></div>
    <div class="floor-line">
      <span>Floor: <span id="floorVal">6.0</span> hrs</span>
      <span class="floor-status" id="floorStatus">—</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-add" id="addHalf">+0.5 HR</button>
      <button class="btn btn-add" id="addOne">+1 HR</button>
      <button class="btn btn-reset" id="resetToday">Reset</button>
    </div>
    <div class="settings-row">
      <span>Set today's floor</span>
      <input type="number" id="floorInput" step="0.5" min="0" value="6">
    </div>
  </div>

  <div class="week-card">
    <div class="week-title">Last 7 days</div>
    <div class="week-strip" id="weekStrip"></div>
    <div class="streak-line">
      <span>Current streak: <b id="streakVal">0</b> days on floor</span>
    </div>
  </div>

  <div class="why-card">
    <div class="why-label">Why this can't happen again</div>
    <textarea class="why-text" id="whyText" placeholder="Write the real reason — the one that matters at 4pm on a slow Tuesday."></textarea>
    <div class="why-save" id="whySaveNote"></div>
  </div>

  <div class="footer-note">The floor is not the goal. It's what you never skip.<br>Data is saved on this device only.</div>
</div>

<script>
const STORAGE_KEY = 'turfLogState';
const todayKey = () => {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
};
const dayLabel = (d) => ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];

function fmtDateHeader() {
  const d = new Date();
  document.getElementById('todayDate').textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function renderOdometer(hours) {
  const whole = Math.floor(hours);
  const dec = Math.round((hours - whole) * 10);
  const digits = String(whole).padStart(2, '0').split('');
  const el = document.getElementById('odoDisplay');
  el.innerHTML = digits.map(d => `<span class="odo-digit">${d}</span>`).join('') +
    `<span class="odo-digit">.${dec}</span><span class="odo-unit">HRS</span>`;
}

function updateFloorStatus(hours, floor) {
  const statusEl = document.getElementById('floorStatus');
  if (hours >= floor && floor > 0) {
    statusEl.textContent = 'FLOOR MET';
    statusEl.className = 'floor-status met';
  } else {
    statusEl.textContent = `${Math.max(0, (floor - hours)).toFixed(1)} HRS TO GO`;
    statusEl.className = 'floor-status under';
  }
}

let state = { entries: {}, floor: 6, why: '' };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = {
        entries: parsed.entries || {},
        floor: typeof parsed.floor === 'number' ? parsed.floor : 6,
        why: typeof parsed.why === 'string' ? parsed.why : ''
      };
    }
  } catch (e) { /* use defaults */ }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { /* storage unavailable */ }
}

function getTodayHours() { return state.entries[todayKey()] || 0; }
function setTodayHours(v) { state.entries[todayKey()] = Math.max(0, Math.round(v * 2) / 2); }

function computeStreak() {
  let streak = 0;
  let d = new Date();
  while (true) {
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const h = state.entries[key];
    if (h !== undefined && h >= state.floor) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

function renderWeek() {
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const h = state.entries[key];
    const cell = document.createElement('div');
    let cls = 'day-cell';
    let mark = '·';
    if (h !== undefined) {
      if (h >= state.floor) { cls += ' met'; mark = '✓'; }
      else { cls += ' under'; mark = '−'; }
    }
    if (i === 0) cls += ' today';
    cell.className = cls;
    cell.innerHTML = `<div class="d">${dayLabel(d)}</div><div class="mark">${mark}</div>`;
    strip.appendChild(cell);
  }
}

function renderAll() {
  const hours = getTodayHours();
  renderOdometer(hours);
  document.getElementById('floorVal').textContent = state.floor.toFixed(1);
  document.getElementById('floorInput').value = state.floor;
  updateFloorStatus(hours, state.floor);
  renderWeek();
  document.getElementById('streakVal').textContent = computeStreak();
  document.getElementById('whyText').value = state.why;
}

function init() {
  fmtDateHeader();
  loadState();
  renderAll();

  document.getElementById('addHalf').addEventListener('click', () => {
    setTodayHours(getTodayHours() + 0.5); saveState(); renderAll();
  });
  document.getElementById('addOne').addEventListener('click', () => {
    setTodayHours(getTodayHours() + 1); saveState(); renderAll();
  });
  document.getElementById('resetToday').addEventListener('click', () => {
    state.entries[todayKey()] = 0; saveState(); renderAll();
  });
  document.getElementById('floorInput').addEventListener('change', (e) => {
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && v >= 0) { state.floor = v; saveState(); renderAll(); }
  });
  let whyTimeout;
  document.getElementById('whyText').addEventListener('input', (e) => {
    state.why = e.target.value;
    document.getElementById('whySaveNote').textContent = 'saving…';
    clearTimeout(whyTimeout);
    whyTimeout = setTimeout(() => {
      saveState();
      document.getElementById('whySaveNote').textContent = 'saved';
      setTimeout(() => { document.getElementById('whySaveNote').textContent = ''; }, 1500);
    }, 600);
  });
}

init();
</script>
</body>
</html>
